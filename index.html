<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mount Molomo — Dungeon Strugglers</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  /* Map variables — toggled by theme */
  --map-bg:#e8d9b5;
  --map-ink:#4a2e10;
  --map-ink-light:#7a5a3a;
  --zone-bg:#e8d8b0;
  --zone-stroke:#5a3a1a;
  --boss-bg:#f0e2cc;
  --boss-stroke:#6a1a0a;
  --wp-fill:#c9a84c;
  --wp-stroke:#8a6020;
  --path-stroke:#5a3a1a;
  --map-text:#3a2010;
  --map-lowlands:#c8b888;
  /* Sidebar variables — FIXED, never toggled */
  --panel-bg:#2f3136;
  --panel-border:#26282c;
  --panel-sub:#252830;
  --panel-deep:#1e2124;
  --panel-input:#26282c;
  --text-bright:#e8e0d0;
  --text-mid:#c0b8ac;
  --text-muted:#9095a0;
  --text-dim:#6a6f78;
  --accent:#c9a84c;
  --accent-dim:#8a6020;
  --accent-muted:#b8983a22;
  --red:#e07070;
  --red-dim:#9a5050;
  --green:#8acc8a;
  --green-dim:#4a7a4a66;
  --topbar:#1e2124;
  --topbar-border:#2a2d31;
}
/* Light map mode — only map-facing variables change */
.map-wrap.map-light { --map-bg:#1a120a; --map-ink:#c8b890; --map-ink-light:#a89870; --zone-bg:#2a1e0e; --zone-stroke:#c8b890; --boss-bg:#2e1a0c; --boss-stroke:#e8c890; --wp-fill:#e8c050; --wp-stroke:#c8a030; --path-stroke:#b09060; --map-text:#d4c4a0; --map-lowlands:#1e160a; }
/* Note: "light" map mode is actually a dark/night parchment — rich dark brown ink on near-black */
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;font-family:'Spectral',Georgia,serif;}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:#1e2124;}
.topbar{height:54px;min-height:54px;background:#1e2124;display:flex;align-items:center;justify-content:space-between;padding:0 22px;border-bottom:1px solid #2a2d31;z-index:20;}
.topbar-left{display:flex;align-items:baseline;gap:10px;}
.topbar-title{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:#e8e0d0;letter-spacing:0.12em;}
.topbar-sub{font-family:'Spectral',serif;font-size:12px;color:#6a6f78;font-style:italic;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.tier-toggle{display:flex;}
.tier-btn{font-family:'Cinzel',serif;font-size:11.5px;letter-spacing:0.07em;padding:5px 14px;border:1px solid #3e4248;background:#26282c;color:#6a6f78;cursor:pointer;transition:all 0.15s;}
.tier-btn:first-child{border-radius:5px 0 0 5px;}
.tier-btn:last-child{border-radius:0 5px 5px 0;border-left:none;}
.tier-btn.active{background:#b8983a22;border-color:#c9a84c;color:#c9a84c;}
.theme-btn{font-family:'Cinzel',serif;font-size:11.5px;letter-spacing:0.07em;padding:5px 14px;border:1px solid #3e4248;background:#26282c;color:#9095a0;cursor:pointer;border-radius:5px;transition:all 0.15s;}
.theme-btn:hover{border-color:#c9a84c;color:#c9a84c;}
.topbar-badge{font-size:11.5px;font-family:'Cinzel',serif;background:#26282c;border:1px solid #c9a84c;color:#c9a84c;padding:5px 14px;border-radius:5px;letter-spacing:0.07em;}
.main{display:flex;flex:1;overflow:hidden;}
.map-wrap{flex:1;position:relative;overflow:hidden;background:var(--map-bg);cursor:grab;transition:background 0.4s ease;}
.map-wrap.panning{cursor:grabbing;}
.map-canvas{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;}
.map-canvas svg{display:block;}
.zone-marker{cursor:pointer;}
.zm-ring-outer,.zm-ring-inner,.zm-bg,.zm-dot,.zm-pulse,.zm-label{transition:all 0.2s ease;}
.zm-label{pointer-events:none;}
.zone-marker:hover .zm-ring-outer{opacity:0.78;}
.zone-marker:hover .zm-ring-inner{opacity:0.95;}
.zone-marker:hover .zm-bg{fill:var(--zone-bg);filter:brightness(1.12);}
.zone-marker:hover .zm-label{opacity:1;}
.zone-marker.active .zm-ring-outer{opacity:0.95;stroke-width:1.5;}
.zone-marker.active .zm-ring-inner{opacity:1;stroke-width:2;}
.zone-marker.active .zm-bg{fill:#d4a840;}
.zone-marker.active .zm-dot{fill:#2a1000;}
.zone-marker.active .zm-label{opacity:1;fill:#1a0e00;}
.zone-marker.boss:hover .zm-bg{filter:brightness(1.08);}
.zone-marker.boss.active .zm-bg{fill:#c8380a;}
.zone-marker.boss.active .zm-label{opacity:1;fill:#1a0800;}
.zone-marker.locked-zone .zm-bg{opacity:0.45;}
.zone-marker.locked-zone .zm-ring-outer{opacity:0.12;}
.zone-marker.locked-zone .zm-ring-inner{opacity:0.18;}
.zone-marker.locked-zone .zm-dot{opacity:0.2;}
.zone-marker.locked-zone .zm-label{opacity:0.25;}
.wp-marker{cursor:pointer;}
.wp-diamond{transition:all 0.18s ease;}
.wp-label{pointer-events:none;transition:opacity 0.18s ease;}
.wp-marker:hover .wp-diamond{fill:#d4a840;stroke:#2a1000;stroke-width:1.5;}
.wp-marker:hover .wp-label{opacity:1;}
.wp-marker.active .wp-diamond{fill:#c9a84c;stroke:#1a0e00;stroke-width:2;}
.wp-marker.active .wp-label{opacity:1;}
/* Map night/dark mode — deeper parchment tones, ink becomes luminous */
.map-wrap.map-dark{background:#1a1208 !important;}
.map-wrap.map-dark .zone-marker .zm-ring-outer{stroke:#c8b890;}
.map-wrap.map-dark .zone-marker .zm-ring-inner{stroke:#c8b890;}
.map-wrap.map-dark .zone-marker .zm-bg{fill:#2e200e;stroke:#c8b890;}
.map-wrap.map-dark .zone-marker .zm-dot{fill:#e8d4a0;}
.map-wrap.map-dark .zone-marker .zm-label{fill:#d4c090 !important;opacity:0.85 !important;}
.map-wrap.map-dark .zone-marker.active .zm-bg{fill:#c9a84c !important;stroke:#8a6010 !important;}
.map-wrap.map-dark .zone-marker.active .zm-dot{fill:#1a0e00 !important;}
.map-wrap.map-dark .zone-marker.boss .zm-bg{fill:#2e1808;stroke:#e09060;}
.map-wrap.map-dark .zone-marker.boss.active .zm-bg{fill:#d04020 !important;}
.map-wrap.map-dark .wp-diamond{fill:#e8c050 !important;stroke:#c09030 !important;}

@keyframes tooltipRise{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.wp-tooltip{position:absolute;pointer-events:none;z-index:100;display:none;transform:translateX(-50%);}
.wp-tooltip.visible{display:block;animation:tooltipRise 0.5s cubic-bezier(0.22,0.8,0.4,1) forwards;}
.wpt-outer{position:relative;filter:drop-shadow(0 3px 10px rgba(0,0,0,0.5));}
.wpt-box{background:var(--panel-deep);border:1.5px solid #6a5430;border-radius:6px;padding:11px 14px 10px;min-width:192px;max-width:215px;position:relative;}
.wpt-tail{width:20px;height:10px;display:block;margin:0 auto;overflow:visible;}
.wpt-title{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:#d4b86a;letter-spacing:0.07em;margin-bottom:5px;line-height:1.3;}
.wpt-text{font-family:'Spectral',serif;font-size:12.5px;color:#b0a888;font-style:italic;line-height:1.6;margin-bottom:7px;}
.wpt-flourish{text-align:right;font-size:14px;color:#6a5430;opacity:0.85;line-height:1;}

.side-panel{width:366px;min-width:366px;background:var(--panel-bg);display:flex;flex-direction:column;overflow:hidden;border-left:1px solid var(--panel-border);}
.panel-scroll{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--panel-border) var(--panel-bg);}
.panel-scroll::-webkit-scrollbar{width:6px;}
.panel-scroll::-webkit-scrollbar-track{background:var(--panel-bg);}
.panel-scroll::-webkit-scrollbar-thumb{background:var(--panel-border);border-radius:3px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.fade-row{opacity:0;animation:fadeUp 0.28s ease forwards;}
@keyframes rollReveal{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.roll-result-anim{animation:rollReveal 0.3s ease forwards;}

.ph{padding:15px 22px 10px;border-bottom:1px solid var(--panel-border);}
.ph-name{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--text-bright);letter-spacing:0.08em;margin-bottom:4px;line-height:1.4;}
.ph-type{font-family:'Spectral',serif;font-size:12px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;}
.ph-flavor{padding:10px 22px 12px;font-family:'Spectral',serif;font-size:14px;color:var(--text-mid);font-style:italic;line-height:1.85;border-bottom:1px solid var(--panel-border);}
.npc-quote{padding:10px 20px 11px;border-bottom:1px solid var(--panel-border);background:var(--panel-sub);}
.npc-text{font-family:'IM Fell English',serif;font-size:13px;color:#c8b890;font-style:italic;line-height:1.7;margin-bottom:3px;}
[data-theme="light"] .npc-text{color:#5a3a18;}
.npc-attr{font-family:'Spectral',serif;font-size:12px;color:var(--text-dim);}
.class-tip{padding:8px 20px 9px;border-bottom:1px solid var(--panel-border);background:var(--panel-sub);display:flex;align-items:flex-start;gap:7px;}
.class-tip-text{font-family:'Spectral',serif;font-size:13px;color:var(--text-muted);line-height:1.6;font-style:italic;}
.class-tip-text strong{color:#aabb98;font-style:normal;font-weight:500;}
[data-theme="light"] .class-tip-text strong{color:#4a6a30;}
.roll-row{display:flex;gap:7px;padding:10px 22px;border-bottom:1px solid var(--panel-border);}
.roll-btn{flex:1;padding:7px 8px;background:var(--panel-input);border:1px solid var(--panel-border);border-radius:5px;color:var(--text-mid);font-family:'Spectral',serif;font-size:13px;cursor:pointer;transition:all 0.15s;text-align:center;line-height:1.3;}
.roll-btn:hover{background:var(--panel-sub);border-color:var(--accent);color:var(--accent);}
.roll-btn:disabled{opacity:0.5;cursor:default;}
.rbicon{display:block;font-size:14px;margin-bottom:1px;}
.rr{padding:6px 22px 8px;}
.rr-inner{padding:9px 12px;background:var(--panel-input);border-radius:4px;border:1px solid var(--panel-border);}
.rr-label{font-size:11px;color:var(--text-muted);font-family:'Cinzel',serif;letter-spacing:0.1em;margin-bottom:4px;}
.rr-text{font-family:'Spectral',serif;font-size:14px;color:var(--text-bright);line-height:1.65;}
.rr-pending{font-family:'Spectral',serif;font-size:13px;color:var(--text-dim);font-style:italic;}
.boss-block{padding:10px 22px;border-bottom:1px solid var(--panel-border);background:var(--panel-sub);}
.boss-name{font-family:'Cinzel',serif;font-size:12px;color:var(--red);letter-spacing:0.07em;margin-bottom:2px;}
.boss-sub{font-family:'Spectral',serif;font-size:12px;color:var(--red-dim);}

.cat-header{display:flex;align-items:center;gap:8px;padding:10px 22px;border-bottom:1px solid var(--panel-border);cursor:pointer;user-select:none;transition:background 0.12s;width:100%;}
.cat-header:hover{background:var(--panel-sub);}
.cat-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;color:#c8b880;transition:color 0.15s;}
[data-theme="light"] .cat-icon{color:#7a5a18;}
.cat-title{font-family:'Cinzel',serif;font-size:10.5px;letter-spacing:0.15em;color:#c0b478;font-weight:600;text-transform:uppercase;flex:1;}
[data-theme="light"] .cat-title{color:#6a4a18;}
.cat-count{font-family:'Spectral',serif;font-size:12px;color:var(--text-dim);margin-right:6px;flex-shrink:0;}
.cat-chevron{font-size:10px;color:var(--text-dim);transition:transform 0.18s;flex-shrink:0;}
.cat-header.open .cat-chevron{transform:rotate(90deg);}
.cat-header.open .cat-title{color:#d4c890;}
.cat-header.open .cat-icon{color:#d4c890;}
[data-theme="light"] .cat-header.open .cat-title{color:#8a5a10;}
[data-theme="light"] .cat-header.open .cat-icon{color:#8a5a10;}
.cat-body{display:none;border-bottom:1px solid var(--panel-border);width:100%;}
.cat-body.open{display:block;}

.item-row{display:flex;align-items:center;border-bottom:1px solid rgba(38,40,44,0.4);width:100%;}
.item-row-btn{flex:1;display:flex;align-items:center;gap:9px;padding:8px 22px;background:none;border:none;cursor:pointer;text-align:left;transition:background 0.12s;min-width:0;width:100%;}
.item-row-btn:hover{background:rgba(50,54,59,0.5);}
[data-theme="light"] .item-row-btn:hover{background:rgba(200,190,170,0.4);}
.item-thumb{width:30px;height:30px;border-radius:4px;background:var(--panel-input);border:1px solid var(--panel-border);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.item-info{flex:1;min-width:0;overflow:hidden;}
.item-name{font-family:'Spectral',serif;font-size:13px;color:var(--text-bright);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
.item-rar{font-family:'Spectral',serif;font-size:12px;font-style:italic;display:block;white-space:nowrap;}
.item-chevron{font-size:10px;color:var(--text-dim);transition:transform 0.15s;flex-shrink:0;margin-left:6px;}
.item-row.open .item-chevron{transform:rotate(90deg);}
.item-detail{background:var(--panel-input);overflow:hidden;max-height:0;transition:max-height 0.28s ease;width:100%;}
.item-detail.open{max-height:500px;}
.item-detail-inner{padding:13px 22px 15px;}
.item-img{width:100%;height:90px;background:var(--panel-deep);border-radius:5px;border:1px solid var(--panel-border);display:flex;align-items:center;justify-content:center;margin-bottom:11px;font-size:32px;opacity:0.45;}
.item-blurb{font-family:'Spectral',serif;font-size:13px;color:var(--text-mid);line-height:1.8;font-style:italic;margin-bottom:9px;}
.item-mechanic{font-family:'Spectral',serif;font-size:12.5px;color:#9aaa88;line-height:1.65;margin-bottom:11px;padding:8px 11px;background:var(--panel-deep);border-radius:4px;border-left:2px solid #5a7a4a;}
[data-theme="light"] .item-mechanic{color:#3a5a28;background:var(--panel-sub);}
.item-cta{display:flex;justify-content:flex-end;}
.item-link{padding:5px 12px;background:var(--panel-deep);border:1px solid rgba(184,152,58,0.35);color:var(--accent);font-family:'Cinzel',serif;font-size:9px;border-radius:4px;cursor:pointer;letter-spacing:0.08em;transition:all 0.15s;}
.item-link:hover{background:var(--accent-muted);border-color:var(--accent);}

.locked-zone-wall{padding:26px 24px;text-align:center;}
.lzw-icon{font-size:24px;color:var(--text-dim);margin-bottom:10px;}
.lzw-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:#c8b870;letter-spacing:0.08em;margin-bottom:8px;}
[data-theme="light"] .lzw-title{color:#7a5010;}
.lzw-text{font-family:'Spectral',serif;font-size:14px;color:var(--text-muted);font-style:italic;line-height:1.75;margin-bottom:14px;}
[data-theme="light"] .lzw-text{color:#5a4828;}
.lzw-btn{display:block;width:100%;padding:8px 12px;background:var(--panel-input);border:1px solid var(--accent);color:var(--accent);font-family:'Cinzel',serif;font-size:10px;border-radius:4px;cursor:pointer;text-align:center;letter-spacing:0.08em;}

.ov-hero{padding:16px 22px 11px;border-bottom:1px solid var(--panel-border);}
.ov-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--text-bright);letter-spacing:0.1em;margin-bottom:4px;}
.ov-desc{font-family:'Spectral',serif;font-size:13px;color:var(--text-muted);line-height:1.85;font-style:italic;}
.ov-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 22px;border-bottom:1px solid var(--panel-border);}
.ov-stat{background:var(--panel-input);border-radius:5px;padding:8px 10px;}
.ov-stat-num{font-family:'Cinzel',serif;font-size:17px;color:var(--accent);font-weight:600;line-height:1;}
.ov-stat-lbl{font-family:'Spectral',serif;font-size:12px;color:var(--text-dim);margin-top:2px;}
.ov-free-tag{padding:9px 22px;border-bottom:1px solid var(--panel-border);}
.ov-free-label{font-family:'Cinzel',serif;font-size:10.5px;letter-spacing:0.13em;font-weight:600;color:#b8b098;text-transform:uppercase;margin-bottom:7px;}
[data-theme="light"] .ov-free-label{color:#6a5028;}
.free-badge{display:inline-block;font-family:'Spectral',serif;font-size:13px;color:#a0c890;background:rgba(122,154,106,0.12);border:1px solid rgba(122,154,106,0.3);border-radius:4px;padding:2px 8px;margin:2px;}
[data-theme="light"] .free-badge{color:#3a6020;background:rgba(80,120,40,0.1);border-color:rgba(80,120,40,0.3);}
.ov-cat{padding:9px 22px;border-bottom:1px solid var(--panel-border);}
.ov-cat-label{font-family:'Cinzel',serif;font-size:10.5px;letter-spacing:0.13em;font-weight:600;color:#b8b098;text-transform:uppercase;margin-bottom:7px;}
[data-theme="light"] .ov-cat-label{color:#6a5028;}
.ov-pill-wrap{display:flex;flex-wrap:wrap;gap:4px;}
.ov-pill{font-family:'Spectral',serif;font-size:12px;color:var(--text-mid);background:var(--panel-input);border:1px solid var(--panel-border);border-radius:4px;padding:2px 8px;}
.ov-pill.locked{color:var(--text-dim);border-color:rgba(38,40,44,0.6);}
[data-theme="light"] .ov-pill.locked{color:#9a9080;border-color:#c8c0b0;}

.gate-full{margin:12px 22px 14px;padding:14px 16px;background:var(--panel-input);border-radius:6px;border:1px solid var(--panel-border);text-align:center;}
.gate-title{font-family:'Cinzel',serif;font-size:12px;color:var(--accent);letter-spacing:0.09em;margin-bottom:6px;text-align:center;}
.gate-text{font-family:'Spectral',serif;font-size:14px;color:var(--text-muted);font-style:italic;line-height:1.75;margin-bottom:10px;text-align:center;}
.gate-btn{display:block;width:100%;padding:9px 12px;background:var(--panel-input);border:1px solid var(--accent);color:var(--accent);font-family:'Cinzel',serif;font-size:11px;border-radius:4px;cursor:pointer;text-align:center;letter-spacing:0.09em;transition:background 0.15s;}
.gate-btn:hover{background:var(--accent-muted);}

.wp-panel-head{padding:14px 22px 10px;border-bottom:1px solid var(--panel-border);background:var(--panel-sub);}
.wp-panel-icon{font-size:18px;margin-bottom:6px;color:var(--accent);}
.wp-panel-name{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--text-bright);letter-spacing:0.08em;margin-bottom:3px;}
.wp-panel-type{font-family:'Spectral',serif;font-size:12px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;}
.wp-panel-desc{padding:10px 22px 12px;font-family:'Spectral',serif;font-size:14px;color:var(--text-mid);font-style:italic;line-height:1.85;border-bottom:1px solid var(--panel-border);}
.wp-event-list{padding:10px 22px;}
.wp-event-label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.12em;color:var(--text-muted);font-weight:600;text-transform:uppercase;margin-bottom:9px;}
.wp-event-row{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid rgba(38,40,44,0.3);}
.wp-event-num{font-family:'Cinzel',serif;font-size:12px;color:#c8b880;min-width:24px;margin-top:1px;font-weight:600;}
[data-theme="light"] .wp-event-num{color:#8a6020;}
.wp-event-text{font-family:'Spectral',serif;font-size:14px;color:var(--text-bright);line-height:1.55;}
.wp-check-wrap{padding:12px 22px 14px;border-top:1px solid var(--panel-border);}
.wp-check-label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.12em;color:var(--text-muted);font-weight:600;text-transform:uppercase;margin-bottom:9px;}
.wp-check-row{display:flex;align-items:flex-start;gap:9px;padding:5px 0;}
.wp-check-badge{font-family:'Cinzel',serif;font-size:10px;background:var(--green-dim);border:1px solid rgba(74,122,74,0.5);color:var(--green);padding:3px 8px;border-radius:3px;white-space:nowrap;flex-shrink:0;line-height:1.4;}
.wp-check-text{font-family:'Spectral',serif;font-size:13px;color:var(--text-muted);font-style:italic;line-height:1.55;}
.map-hint{position:absolute;bottom:12px;left:14px;font-family:'Spectral',serif;font-size:11px;color:#3a2a12;background:rgba(221,208,168,0.88);padding:4px 10px;border-radius:3px;pointer-events:none;transition:opacity 1.5s;}
[data-theme="light"] .map-hint{color:#3a2a12;background:rgba(200,185,150,0.9);}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-title">Mount Molomo</span>
      <span class="topbar-sub">— Dungeon Strugglers</span>
    </div>
    <div class="topbar-right">
      <div class="tier-toggle">

<script>
const RC={'Common':'#92bc82','Uncommon':'#5aaa8a','Rare':'#6090cc','Very Rare':'#a878cc','Legendary':'#d49030','Patron':'#c9a84c'};
function rc(r){return RC[r]||'#9a9590';}
const ICONS={treasure:'◈',item:'✦',spell:'✶',flora:'❧',familiar:'◎',mount:'⬡',subclass:'❋'};
let currentTier='free',currentId=null,currentType=null;

let isDark=false; // false = parchment (default), true = night map

function toggleTheme(){
  isDark=!isDark;
  const mw=document.getElementById('mapWrap');
  if(isDark){
    mw.classList.add('map-dark');
    document.getElementById('themeBtn').textContent='☀ Day Map';
    // tint map SVG background
    const bg=document.getElementById('mapBg');
    if(bg){bg.setAttribute('fill','#1a1208');}
    document.getElementById('pathLayer').setAttribute('opacity','0.75');
  } else {
    mw.classList.remove('map-dark');
    document.getElementById('themeBtn').textContent='☾ Night Map';
    const bg=document.getElementById('mapBg');
    if(bg){bg.setAttribute('fill','#e8d9b5');}
    document.getElementById('pathLayer').setAttribute('opacity','0.55');
  }
}

const NPC={
  emberwoodgrove:[{q:"The trees here don't cast shadows. Haven't since the burning.",a:"— Finn, wandering bard"},{q:"I heard the Ash Druid laughing three nights running. Not a happy laugh.",a:"— Kess, shepherd"},{q:"The Cinderphoenix doesn't attack unless you near the nest.",a:"— Maren, trail guide"}],
  coppervein:[{q:"The ore ran out twenty years ago. Whatever's still down there didn't.",a:"— Dossa Veil, retired miner"},{q:"My brother left a lantern on peg nine. It's still lit. He isn't.",a:"— Overheard at the Ashen Flagon"},{q:"You want copper? Buy it from a merchant.",a:"— Skarran, smithwright"}],
  ashveil:[{q:"The ash doesn't drift here. It waits.",a:"— Mira Coldthorn, courier"},{q:"You'll hear harpies before you see them. That's the only mercy.",a:"— Gareth, warden"},{q:"I've crossed Ashveil Pass six times. Seventh time I didn't go alone.",a:"— Berroc the Trader"}],
  summit:[{q:"The cold at the top is different. It remembers you.",a:"— Elara Frostmantle, survivor"},{q:"Karreth was built to guard something. It doesn't seem to know what.",a:"— Scholar Dunwick"},{q:"Three groups went up last season. We found notes from the fourth.",a:"— Captain Vorn"}],
  moltenflank:[{q:"The rock breathes here. Put your hand on it at midnight.",a:"— Osric, geomancer's apprentice"},{q:"Drake eggs fetch fifty gold in the city. I have three fingers to prove it.",a:"— Redda the Collector"},{q:"The Forgeborn have been looking for something. A hundred years and counting.",a:"— Unnamed pilgrim"}],
  gearedgod:[{q:"The gears predate the kingdom. Predate the mountain, some say.",a:"— Brother Aldric, lorekeeper"},{q:"We heard it walking last night. The footsteps have a rhythm.",a:"— Ysolde, expedition log, day 4"},{q:"I translated the sigils: 'The work continues.'",a:"— Dara Voss, runewright"}],
  ashenhollows:[{q:"Hollow places hold hollow things. Don't answer if something calls back.",a:"— Mountain folk proverb"},{q:"I found a merchant in there. Petrified mid-step. I left him.",a:"— Torren the Cautious"},{q:"The Basilisk moves slowly. That's the trap.",a:"— Scratched on a cavern wall"}],
  stonewardenruins:[{q:"The wall still stands. I don't know what that means.",a:"— Nessa, historian"},{q:"The Warden Ghost wants you to know what happened here.",a:"— Brother Cray"},{q:"We found the vault. We closed the vault.",a:"— Survey team, archive seal 7"}]
};
const OV_NPC=[{q:"I've mapped forty ranges. Molomo is the only one that felt like it was mapping me back.",a:"— Cartographer Serel"},{q:"The mountain doesn't care if you're brave. It cares if you're prepared.",a:"— Captain Vorn"},{q:"Something up there is waiting. The question is whether you show up.",a:"— Unnamed oracle"}];
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function fa(h,d){return `<div class="fade-row" style="animation-delay:${d}ms;">${h}</div>`;}

const WAYPOINTS=[

(function(){

  let pan=false,sx=0,sy=0,tx=0,ty=0,didMove=false;

  function clamp(){
    const ww=wrap.clientWidth,wh=wrap.clientHeight;
    tx=Math.max(Math.min(0,ww-SVG_W),Math.min(0,tx));
    ty=Math.max(Math.min(0,wh-SVG_H),Math.min(0,ty));
  }
  function apply(){
    canvas.style.transform=`translate(${tx}px,${ty}px) scale(${SCALE})`;
  }

  // Start panned to the heart of the mountain (roughly centre-upper)
  tx=-(SVG_W-wrap.clientWidth)*0.50;
  ty=-(SVG_H-wrap.clientHeight)*0.44;
  clamp();apply();

  wrap.addEventListener('mousedown',e=>{
    if(e.target.closest('.zone-marker')||e.target.closest('.wp-marker'))return;
    pan=true;didMove=false;sx=e.clientX-tx;sy=e.clientY-ty;
    wrap.style.cursor='grabbing';
    if(hint)hint.style.opacity='0';

  window.addEventListener('mousemove',e=>{
    if(!pan)return;
    const nx=e.clientX-sx,ny=e.clientY-sy;
    if(Math.abs(nx-tx)>3||Math.abs(ny-ty)>3)didMove=true;
    tx=nx;ty=ny;clamp();apply();
  });
  window.addEventListener('mouseup',()=>{pan=false;wrap.style.cursor='grab';});
  wrap.addEventListener('click',e=>{
    if(e.target.closest('.zone-marker')||e.target.closest('.wp-marker'))return;
    if(didMove){didMove=false;return;}
    showOverview();
  });
  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    pan=true;didMove=false;
    sx=e.touches[0].clientX-tx;sy=e.touches[0].clientY-ty;
    if(hint)hint.style.opacity='0';
  },{passive:true});
  wrap.addEventListener('touchmove',e=>{
    if(!pan||e.touches.length!==1)return;
    const nx=e.touches[0].clientX-sx,ny=e.touches[0].clientY-sy;
    if(Math.abs(nx-tx)>3||Math.abs(ny-ty)>3)didMove=true;
    tx=nx;ty=ny;clamp();apply();e.preventDefault();
  },{passive:false});
  wrap.addEventListener('touchend',()=>{pan=false;});
  setTimeout(()=>{if(hint)hint.style.opacity='0';},4000);
})();
</script>
